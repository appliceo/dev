; Pass through environment variables to PHP-FPM workers.
; Without this (php-fpm default `clear_env = yes`), `getenv('JWT_SECRET')`
; returns false in worker processes — even if the var is set on the
; container — and JWT validation in bin/common.php silently no-ops.
;
; Mounted at /usr/local/etc/php-fpm.d/zz-env.conf via the dev-stack compose.

[www]
clear_env = no

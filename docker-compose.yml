name: appliceo-dev

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${PORT_POSTGRES:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appliceo_v2}
      POSTGRES_USER: ${POSTGRES_USER:-appliceo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appliceo_dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appliceo} -d ${POSTGRES_DB:-appliceo_v2}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    ports:
      - "${PORT_MYSQL:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appliceo_php}
      MYSQL_USER: ${MYSQL_USER:-appliceo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-appliceo123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./appliceo-php/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./appliceo-php/docker/mysql/conf.d:/etc/mysql/conf.d:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-appliceo}", "-p${MYSQL_PASSWORD:-appliceo123}"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  php:
    build:
      context: ./appliceo-php
      dockerfile: docker/php/Dockerfile
    env_file:
      - path: ./appliceo-php/.env
        required: false
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-appliceo_php}
      DB_USER: ${MYSQL_USER:-appliceo}
      DB_PASSWORD: ${MYSQL_PASSWORD:-appliceo123}
      MIGRATIONS_DIR: /migrations
    volumes:
      - ./appliceo-php:/var/www/html
      - ./appliceo-php/migrations:/migrations:ro
    depends_on:
      mysql:
        condition: service_healthy

  apache:
    image: httpd:2.4
    ports:
      - "${PORT_PHP_HTTP:-8080}:80"
      - "${PORT_PHP_HTTPS:-8443}:443"
    volumes:
      - ./appliceo-php:/var/www/html
      - ./appliceo-php/docker/apache/vhost.conf:/usr/local/apache2/conf/extra/httpd-vhosts.conf:ro
      - ./appliceo-php/docker/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./appliceo-php/docker/apache/httpd-ssl.conf:/usr/local/apache2/conf/extra/httpd-ssl.conf:ro
      - ./appliceo-php/docker/apache/ssl:/usr/local/apache2/conf/ssl:ro
    depends_on:
      - php

  siblings-init:
    image: node:20-alpine
    working_dir: /workspace
    command: ["sh", "/workspace/docker/siblings-init.sh"]
    volumes:
      - ./docker:/workspace/docker:ro
      - ./appliceo-ui:/workspace/appliceo-ui
      - ./appliceo-lease-config:/workspace/appliceo-lease-config
      - ./appliceo-lease-editor:/workspace/appliceo-lease-editor
      - sib_ui_node_modules:/workspace/appliceo-ui/node_modules
      - sib_cfg_node_modules:/workspace/appliceo-lease-config/node_modules
      - sib_le_node_modules:/workspace/appliceo-lease-editor/node_modules
    environment:
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_AUDIT: "false"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: appliceo-api/Dockerfile.dev
    ports:
      - "${PORT_API:-5001}:5001"
    env_file:
      - path: ./appliceo-api/.env
        required: false
    environment:
      NODE_ENV: development
      PORT: 5001
      FASTIFY_ADDRESS: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-appliceo}:${POSTGRES_PASSWORD:-appliceo_dev}@postgres:5432/${POSTGRES_DB:-appliceo_v2}
      CORS_ORIGIN: http://localhost:${PORT_DOCUCEO:-4321}
      V1_PHP_API_URL: ${V1_PHP_API_URL:-http://apache:80}
      V1_PHP_BASIC_AUTH: ${PHP_BASIC_AUTH:-}
    volumes:
      - ./appliceo-api:/workspace/appliceo-api
      - api_node_modules:/workspace/appliceo-api/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  lease-editor:
    build:
      context: .
      dockerfile: appliceo-lease-editor/Dockerfile.dev
    ports:
      - "${PORT_LEASE_EDITOR:-3001}:3001"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      PHP_API_URL: ${PHP_API_URL:-http://apache:80}
      PHP_BASIC_AUTH: ${PHP_BASIC_AUTH:-}
    volumes:
      - ./appliceo-lease-editor:/workspace/appliceo-lease-editor
      - ./appliceo-ui:/workspace/appliceo-ui
      - ./appliceo-lease-config:/workspace/appliceo-lease-config
      - le_node_modules:/workspace/appliceo-lease-editor/node_modules
      - sib_ui_node_modules:/workspace/appliceo-ui/node_modules
      - sib_cfg_node_modules:/workspace/appliceo-lease-config/node_modules
    depends_on:
      siblings-init:
        condition: service_completed_successfully

  docuceo:
    build:
      context: .
      dockerfile: docuceo/Dockerfile.dev
    ports:
      - "${PORT_DOCUCEO:-4321}:4321"
    env_file:
      - path: ./docuceo/.env
        required: false
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      MONO: /workspace
      PUBLIC_API_URL: http://api:5001
      PUBLIC_PHP_API_URL: ${PUBLIC_PHP_API_URL:-http://apache:80}
      PHP_BASIC_AUTH: ${PHP_BASIC_AUTH:-}
    volumes:
      - ./docuceo:/workspace/docuceo
      - ./appliceo-ui:/workspace/appliceo-ui
      - ./appliceo-lease-config:/workspace/appliceo-lease-config
      - ./appliceo-lease-editor:/workspace/appliceo-lease-editor
      - dc_node_modules:/workspace/docuceo/node_modules
      # vendor/ stays as a bind mount: host's package.json stubs must be visible
      # to the container, and vendor-rebuild produces text-only artefacts safe
      # to write back to the host.
      - sib_ui_node_modules:/workspace/appliceo-ui/node_modules
      - sib_cfg_node_modules:/workspace/appliceo-lease-config/node_modules
      - sib_le_node_modules:/workspace/appliceo-lease-editor/node_modules
    depends_on:
      api:
        condition: service_started
      siblings-init:
        condition: service_completed_successfully

volumes:
  pg_data:
  mysql_data:
  api_node_modules:
  le_node_modules:
  dc_node_modules:
  sib_ui_node_modules:
  sib_cfg_node_modules:
  sib_le_node_modules:
